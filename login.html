<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataBridge AI — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --border: #e0e0d8;
    --accent: #00a67e;
    --accent-light: rgba(0,166,126,0.08);
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --danger: #dc2626;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,166,126,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,166,126,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .container {
    position: relative;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .card-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 28px; }
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block; }
  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 12px 16px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-primary:hover { background: #008f6c; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 0.7rem; color: var(--muted); }
  .btn-google {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-google:hover { border-color: var(--accent); color: var(--accent); }
  .msg { font-size: 0.78rem; padding: 10px 14px; border-radius: 4px; margin-top: 12px; display: none; }
  .msg.error { background: rgba(220,38,38,0.08); color: var(--danger); border: 1px solid rgba(220,38,38,0.2); display: block; }
  .msg.success { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(0,166,126,0.2); display: block; }
  .footer-text { text-align: center; font-size: 0.7rem; color: var(--muted); margin-top: 20px; }
  .footer-text a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Data<span>Bridge</span></div>
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access your AI analyst</div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('signin')">Sign In</div>
      <div class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- SIGN IN -->
    <div id="signinForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="signinEmail" placeholder="you@company.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="signinPassword" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="signIn()" id="signinBtn">Sign In →</button>
      <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>
      <button class="btn-google" onclick="signInGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
      <div class="msg" id="signinMsg"></div>
    </div>

    <!-- SIGN UP -->
    <div id="signupForm" style="display:none;">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" id="signupName" placeholder="Your name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="signupEmail" placeholder="you@company.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="signupPassword" placeholder="Min 8 characters">
      </div>
      <button class="btn-primary" onclick="signUp()" id="signupBtn">Create Account →</button>
      <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>
      <button class="btn-google" onclick="signInGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
      <div class="msg" id="signupMsg"></div>
    </div>
  </div>
  <div class="footer-text">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></div>
</div>

<script>
  const SUPABASE_URL = 'https://bnjgttzibuaohebtnflf.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_PAKOGW8qNa6nCDG0kR2ggQ_5jQPOB9V';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Redirect if already logged in
  supabase.auth.getSession().then(function(result) {
    if (result.data.session) window.location.href = '/';
  });

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    event.target.classList.add('active');
    document.getElementById('signinForm').style.display = tab === 'signin' ? 'block' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
  }

  function showMsg(id, msg, type) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'msg ' + type;
  }

  async function signIn() {
    var email = document.getElementById('signinEmail').value.trim();
    var password = document.getElementById('signinPassword').value;
    var btn = document.getElementById('signinBtn');
    if (!email || !password) return showMsg('signinMsg', 'Please fill in all fields.', 'error');
    btn.disabled = true; btn.textContent = 'Signing in...';
    var result = await supabase.auth.signInWithPassword({ email: email, password: password });
    if (result.error) { showMsg('signinMsg', result.error.message, 'error'); btn.disabled = false; btn.textContent = 'Sign In →'; }
    else window.location.href = '/';
  }

  async function signUp() {
    var name = document.getElementById('signupName').value.trim();
    var email = document.getElementById('signupEmail').value.trim();
    var password = document.getElementById('signupPassword').value;
    var btn = document.getElementById('signupBtn');
    if (!name || !email || !password) return showMsg('signupMsg', 'Please fill in all fields.', 'error');
    if (password.length < 8) return showMsg('signupMsg', 'Password must be at least 8 characters.', 'error');
    btn.disabled = true; btn.textContent = 'Creating account...';
    var result = await supabase.auth.signUp({ email: email, password: password, options: { data: { full_name: name } } });
    if (result.error) { showMsg('signupMsg', result.error.message, 'error'); btn.disabled = false; btn.textContent = 'Create Account →'; }
    else showMsg('signupMsg', 'Account created! Check your email to confirm.', 'success');
    btn.disabled = false; btn.textContent = 'Create Account →';
  }

  async function signInGoogle() {
    await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/' } });
  }
</script>
</body>
</html>
